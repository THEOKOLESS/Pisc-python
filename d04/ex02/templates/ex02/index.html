<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ex02 : Form & History</title>
    <style>
        body { font-family: sans-serif; max-width: 700px; margin: 40px auto; padding: 0 20px; line-height: 1.6; }
        h1, h2 { border-bottom: 1px solid #ccc; padding-bottom: 8px; }
        form { display: flex; gap: 10px; margin: 20px 0; }
        input[type="text"] { flex: 1; padding: 8px; font-size: 1em; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 8px 16px; font-size: 1em; cursor: pointer; }
        ul { list-style: none; padding: 0; }
        li { padding: 6px 0; border-bottom: 1px solid #eee; font-family: monospace; }
        .empty { color: #888; font-style: italic; }
    </style>
</head>
<body>

<h1>Ex02 : Form &amp; History</h1>

<h2>Formulaire</h2>
<form method="post">
    {% csrf_token %}
    {{ form }}
    <button type="submit">Submit</button>
</form>

<h2>Historique</h2>
{% if history %}
    <ul>
        {% for entry in history %}
            <li>{{ entry }}</li>
        {% endfor %}
    </ul>
{% else %}
    <p class="empty">Aucune entrée pour le moment.</p>
{% endif %}

</body>
</html>
